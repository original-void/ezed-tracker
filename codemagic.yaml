workflows:
  android-workflow:
    name: Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Generate Gradle wrapper
        script: gradle wrapper --gradle-version 8.0
      - name: Build APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
